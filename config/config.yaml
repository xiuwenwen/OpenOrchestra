system:
  workspace_root: "./workspaces"
  artifact_root: "./artifacts"
  deliver_root: "./deliver"
  state_db: "./state/harness.db"
  source_repo: "."

agent_backend:
  default: "codex"
  planner: "codex"
  executor: "codex"
  tester: "codex"
  reviewer: "codex"
  communicator: "codex"

runtime:
  mode: docker
  docker:
    enabled: true
    image: openorchestra-agent-runtime:latest
    workdir: /workspace
    network: bridge
    cache_root: ~/.openorchestra/cache/docker
    env_allowlist: []
    bootstrap:
      enabled: true
      auto_build: true
      build_context: docker/agent-runtime
      install_agent_clis: true
      require_backend_cli: true
      build_timeout_seconds: 1800
    backend_config_mounts:
      claude:
        - host: ~/.claude
          container: /home/openorchestra/.claude
          read_only: true
          writable_subpaths: ["session-env"]
        - host: ~/.claude.json
          container: /home/openorchestra/.claude.json
          read_only: true
      codex:
        - host: ~/.codex
          container: /home/openorchestra/.codex
          read_only: true

roles:
  planner:
    count: 2
  executor:
    count: 2
  tester:
    count: 1
  reviewer:
    count: 1
  communicator:
    count: 1

limits:
  max_planning_rounds: 3
  planning_peer_review_loops: 3
  planner_peer_review_difficulty_threshold: 5
  max_test_fix_rounds: 10
  fix_tester_plan_recheck_after: 5
  max_tester_environment_repair_rounds: 2
  max_review_rounds: 3
  max_agent_retry: 2

timeouts:
  planner: 1800
  executor: 3600
  tester: 1800
  reviewer: 1800
  communicator: 1200

heartbeat:
  interval_seconds: 60

backend_concurrency: {}
role_concurrency: {}
scheduler:
  global_concurrency: 0

visualization:
  host: "127.0.0.1"
  port: 8765

claude:
  context_window_tokens: 199999
  context_window_buffer_tokens: 2048
  max_output_tokens:
    classifier: 2048
    misc: 64000
    planner: 64000
    executor: 64000
    tester: 64000
    reviewer: 64000
    communicator: 64000

artifact_input:
  max_files: 50
  max_file_bytes: 262144
  max_total_bytes: 1048576

testing:
  runtime: docker
  timeout_seconds: 120
  docker:
    enabled: true
    default_python_image: python:3.11-bookworm
    default_node_image: node:20-bookworm
    default_go_image: golang:1.22-bookworm
    default_rust_image: rust:1.78-bookworm
    setup_network: bridge
    test_network: none
    timeout_seconds: 1800
    cache_mounts: true
    cache_root: ~/.openorchestra/cache/docker
    auto_setup: false
    allow_project_dockerfile: true
    userns: host
  swebench:
    enabled: false

runtime_readiness:
  require_commands: false

final_validation:
  enabled: true
  allow_contract_commands: false
  require_executable: false
  timeout_seconds: 1800
  docker:
    network: none

patch_gate:
  docker:
    network: none

policy:
  same_role_can_run_concurrently: true
  allow_medium_bug_delivery: false
  require_all_tests_pass: true
